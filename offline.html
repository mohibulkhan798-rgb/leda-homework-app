<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Leda · 离线模式</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex items-center justify-center px-4">
  <div class="max-w-sm w-full bg-white rounded-3xl border border-slate-100 shadow-sm p-5 text-center">
    <h1 class="text-2xl font-semibold tracking-tight">Leda</h1>
    <p class="text-sm mt-3">当前离线，已进入离线模式。</p>
    <p class="text-xs text-slate-500 mt-2">网络恢复后会自动同步最新页面与资源。</p>
    <button onclick="location.reload()" class="mt-4 rounded-2xl bg-slate-900 text-white px-4 py-2 text-sm active:scale-95 transition-transform duration-200">
      重新尝试
    </button>
  </div>
</body>
</html>
